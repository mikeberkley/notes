<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left hemisphere -->
  <path d="
    M 16 7
    C 14 7, 10 7.5, 8 9.5
    C 6 11.5, 5 14, 5 16
    C 5 19.5, 7 22.5, 10 24
    C 12 25, 14 25.2, 16 25
    Z
  " fill="white" opacity="0.95"/>

  <!-- Right hemisphere -->
  <path d="
    M 16 7
    C 18 7, 22 7.5, 24 9.5
    C 26 11.5, 27 14, 27 16
    C 27 19.5, 25 22.5, 22 24
    C 20 25, 18 25.2, 16 25
    Z
  " fill="white" opacity="0.95"/>

  <!-- Center fissure -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="url(#bg)" stroke-width="1.8"/>

  <!-- Left fold -->
  <path d="M 10 12 C 8 15 8 18.5 10 21" stroke="#4338ca" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Right fold -->
  <path d="M 22 12 C 24 15 24 18.5 22 21" stroke="#4338ca" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
