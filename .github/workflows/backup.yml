name: Weekly D1 Backup to R2

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 04:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Export D1 → R2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Export D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 74088836dff42e8f84630c2a7a51a4aa
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OUTFILE="notes-db-${DATE}.sql"
          TABLES="users oauth_tokens api_keys config raw_sources smos themes source_pointers"
          for TABLE in $TABLES; do
            wrangler d1 export notes-db --remote --table "$TABLE" --output "${TABLE}.sql"
            cat "${TABLE}.sql" >> "$OUTFILE"
            echo "" >> "$OUTFILE"
          done
          wrangler r2 object put "notes-db-backups/${OUTFILE}" --file "$OUTFILE"
          echo "Backup uploaded: ${OUTFILE}"
